name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: python -m pip install -r requirements.txt

      - name: Validar sintaxe
        run: >-
          python -m compileall -q
          app.py application components domain engine infrastructure pages scripts tests

      - name: Executar lint crítico
        run: >-
          flake8 .
          --exclude=.git,__pycache__,.venv,node_modules
          --select=E9,F63,F7,F82

      - name: Executar testes offline com cobertura
        run: >-
          pytest -q
          --cov=domain
          --cov=engine
          --cov=application.services
          --cov-report=term
          --cov-fail-under=70
          tests
